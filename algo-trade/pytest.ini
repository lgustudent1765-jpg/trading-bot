[pytest]
# Auto mode: all async test functions run under asyncio without needing @pytest.mark.asyncio
asyncio_mode = auto

# Discover both classic test_ files and behaviour-spec .spec.py files
python_files  = test_*.py *_test.py *.spec.py
python_classes  = Test*
python_functions = test_*

testpaths = tests

# Short tracebacks for cleaner CI output; override with -v locally
addopts = --tb=short -q --import-mode=importlib

# Strict marker handling — avoids silent typos in marker names
markers =
    e2e: end-to-end integration tests (require no external network)
    api: REST/WebSocket API surface tests
    pipeline: full async pipeline flow tests
    unit: isolated unit tests (no I/O)
